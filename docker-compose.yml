services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-billing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel
      POSTGRES_DB: hotel_billing
    ports:
      - "5432:5432"
    volumes:
      - hotel_billing_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_billing"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hotel_billing_postgres_data:
